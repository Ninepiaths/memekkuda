<!DOCTYPE html>
<html lang="en" style="background-color: rgba(0,0,0,0); width:100%; height:100%;">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Growtopia Player Support</title>

<link rel="icon" type="image/png"
href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico"
sizes="16x16">

<link rel="shortcut icon"
href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico">

<link rel="icon"
href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/images/growtopia.ico">

<link rel="stylesheet"
href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/faq-main.css">

<link rel="stylesheet"
href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/shop-custom.css">

<link rel="stylesheet"
href="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/assets/css/ingame-custom.css">

<style>
.modal-backdrop {
background-color: rgba(0,0,0,0.1);
}

.modal-backdrop + div {
overflow:auto;
}

.modal-body,.content{
padding:0;
}
</style>
</head>

<body style="background-color: rgba(0,0,0,0)">

<button
type="button"
class="btn btn-primary hidden"
data-toggle="modal"
id="modalButton"
data-target="#modalShow"
data-backdrop="static"
data-keyboard="false">
</button>

<div class="content">

<section class="common-box">

<div class="container">

<div class="row">

<div class="col-md-12 col-sm-12">

<div class="row">

<div class="modal fade product-list-popup"
id="modalShow"
tabindex="-1"
role="dialog"
aria-hidden="false">

<div class="modal-dialog modal-dialog-centered" role="document">

<div class="modal-content">

<div class="modal-body">

<div class="content">

<section class="common-box">

<div class="container">

<div class="section-title center-align">

<h2>Log Into Your GTPSID</h2>

</div>

<div class="row div-content-center">

<div class="col-md-12 col-sm-12">

<form
method="POST"
id="loginForm"
action="/player/growid/login/validate"
accept-charset="UTF-8"
role="form"
autocomplete="off">

<input name="_token" type="hidden" value="<%= data %>">

<div class="form-group">

<input
id="loginGrowId"
class="form-control grow-text"
placeholder="Your GrowID Name *"
name="growId"
type="text">

</div>

<div class="form-group">

<input
id="loginPassword"
class="form-control grow-text"
placeholder="Your GrowID Password *"
name="password"
type="password">

</div>

<div class="form-group text-center">

<input
id="loginButton"
class="btn btn-lg btn-primary grow-button"
type="submit"
value="Login">

</div>

</form>

<form
method="POST"
action="/player/growid/login/validate">

<input name="_token" type="hidden" value="">
<input name="growId" type="hidden" value="">
<input name="password" type="hidden" value="">

<input
class="btn btn-lg btn-primary grow-button"
type="submit"
value="Don't have any GTPSID? Register here!">

</form>

</div>
</div>

</div>

</section>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</section>

</div>

<script src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/vendors/jquery/jquery-2.1.4.min.js"></script>

<script src="https://s3.eu-west-1.amazonaws.com/cdn.growtopiagame.com/website/resources/vendors/bootstrap/javascripts/bootstrap.min.js"></script>

<script>

let clicked=false;

$('a').click(function(){
if(clicked===false){
clicked=true;
return true;
}
$(this).attr('onclick','return false;');
});

$('document').ready(function(){

document.onkeydown=e=>{

if(e.key==123) e.preventDefault();
if(e.key=='F12') e.preventDefault();
if(e.ctrlKey&&e.shiftKey&&e.key=='I') e.preventDefault();
if(e.ctrlKey&&e.key=='I') e.preventDefault();
if(e.ctrlKey&&e.shiftKey&&e.key=='C') e.preventDefault();
if(e.ctrlKey&&e.shiftKey&&e.key=='J') e.preventDefault();
if(e.ctrlKey&&e.key=='U') e.preventDefault();

};

$('#modalButton').trigger('click');

$('.close').on('click',function(){
window.location='/player/validate/close';
});

});

</script>

<script>

document.getElementById('loginButton').addEventListener('click',function(event){

event.preventDefault();

const loginForm=document.getElementById('loginForm');

const uName=document.getElementById('loginGrowId').value;
const uPass=document.getElementById('loginPassword').value;

if(!uName || !uPass){

alert("Username or Password is empty");
return;

}

loginForm.submit();

});

</script>

</body>
</html>
